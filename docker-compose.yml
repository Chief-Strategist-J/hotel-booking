services:
  db:
    image: postgres:16-alpine
    container_name: hotel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: hotel123
      POSTGRES_DB: hotel_db
    ports:
      - '5432:5432'
    volumes:
      - hotel_db_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: hotel-mail
    restart: unless-stopped
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI

volumes:
  hotel_db_data:
